name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Gradle
      run: |
        # 强制使用系统 gradle 生成 wrapper (确保 JAR 正确)
        apt-get update -qq && apt-get install -y gradle 2>/dev/null || true
        gradle wrapper --gradle-version 8.5 --no-daemon 2>/dev/null || true

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android SDK 34
      run: |
        sdkmanager "platforms;android-34" "build-tools;34.0.0" "cmdline-tools;latest" "platform-tools"

    - name: Build APK
      run: |
        chmod +x ./gradlew
        export ANDROID_HOME=$ANDROID_SDK_ROOT
        ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Upload Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: cesia-input-method
        path: app/build/outputs/apk/debug/app-debug.apk
