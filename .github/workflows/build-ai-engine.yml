# Build ai-engine (native-bridge.so + mnn-llm-bridge.so) for Android
# Uses pre-compiled MNN static libraries (libMNN.a + libllm.a) via Git LLM

name: Build native-bridge.so

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          lfs: true

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ninja-build cmake

      - name: Install Android NDK
        run: |
          export SDK_ROOT=${{ github.workspace }}/android-sdk
          mkdir -p $SDK_ROOT
          if [ ! -d "$SDK_ROOT/cmdline-tools/latest" ]; then
            curl -sL "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" \
              -o /tmp/cmdtools.zip
            mkdir -p $SDK_ROOT/cmdline-tools
            unzip -q /tmp/cmdtools.zip -d /tmp/
            mv /tmp/cmdline-tools $SDK_ROOT/cmdline-tools/latest
          fi
          export JAVA_HOME=$JAVA_HOME_17_X64
          export PATH=$JAVA_HOME/bin:$SDK_ROOT/cmdline-tools/latest/bin:$PATH
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager --install "platforms;android-34" > /dev/null 2>&1
          sdkmanager --install "ndk;25.2.9519653" > /dev/null 2>&1
          echo "NDK_HOME=$SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "SDK_ROOT=$SDK_ROOT" >> $GITHUB_ENV

      - name: Build with Gradle
        run: |
          cd ${{ github.workspace }}
          export JAVA_HOME=$JAVA_HOME_17_X64
          export ANDROID_HOME=${{ env.SDK_ROOT }}
          export ANDROID_NDK_HOME=${{ env.NDK_HOME }}
          ./gradlew :ai-engine:assembleDebug \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx4g"

      - name: Upload native libraries
        uses: actions/upload-artifact@v4
        with:
          name: native-libs
          path: |
            ai-engine/build/intermediates/stripped_native_libs/debug/out/lib/arm64-v8a/*.so
          retention-days: 30
