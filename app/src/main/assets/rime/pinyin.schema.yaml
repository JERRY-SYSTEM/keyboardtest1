# Rime schema — Cesia输入法 简化版
schema:
  schema_id: pinyin
  name: 拼音
  version: "1.1.1"
  author:
    - Cesia
  description: |
    雾凇拼音精简版 - Cesia输入法内置
    Based on rime-ice (iDvel/rime-ice)

# 开关
switches:
  - name: ascii_mode
    reset: 0
    states: [ 中, Ａ ]
  - name: ascii_punct
    states: [ ¥, $ ]
  - name: full_shape
    states: [ 半角, 全角 ]

# 输入引擎
engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - script_translator
  filters:
    - uniquifier

# 拼音拼写器
speller:
  alphabet: zyxwvutsrqponmlkjihgfedcba
  delimiter: " '"

# 翻译器
translator:
  dictionary: pinyin
  spelling_hints: 5
  always_show_comment: false
  enable_completion: true
  enable_sentence: true
  enable_user_dict: true
  comment_format:
    - xform/.*//

# 标点符号
punctuator:
  full_shape:
    " " : { commit: "　" }
    "," : { commit: "，" }
    "." : { commit: "。" }
    "<" : { commit: "《" }
    ">" : { commit: "》" }
    "/" : { commit: "／" }
    "?" : { commit: "？" }
    ";" : { commit: "；" }
    ":" : { commit: "：" }
    "'" : { pair: [ "「", "」" ] }
    "\"" : { pair: [ "『", "』" ] }
    "\\" : { commit: "、" }
    "|" : { commit: "｜" }
    "`" : { commit: "·" }
    "~" : { commit: "～" }
    "!" : { commit: "！" }
    "@" : { commit: "＠" }
    "#" : { commit: "＃" }
    "$" : { commit: "＄" }
    "%" : { commit: "％" }
    "^" : { commit: "＾" }
    "&" : { commit: "＆" }
    "*" : { commit: "＊" }
    "(" : { commit: "（" }
    ")" : { commit: "）" }
    "_" : { commit: "＿" }
    "+" : { commit: "＋" }
  half_shape:
    "," : { commit: "," }
    "." : { commit: "." }
    "<" : { commit: "<" }
    ">" : { commit: ">" }
    "/" : { commit: "/" }
    "?" : { commit: "?" }
    ";" : { commit: ";" }
    ":" : { commit: ":" }
    "'" : { commit: "'" }
    "\"" : { commit: "\"" }
    "\\" : { commit: "\\" }
    "|" : { commit: "|" }
    "`" : { commit: "`" }
    "~" : { commit: "~" }
    "!" : { commit: "!" }
    "@" : { commit: "@" }
    "#" : { commit: "#" }
    "$" : { commit: "$" }
    "%" : { commit: "%" }
    "^" : { commit: "^" }
    "&" : { commit: "&" }
    "*" : { commit: "*" }
    "(" : { commit: "(" }
    ")" : { commit: ")" }
    "_" : { commit: "_" }
    "+" : { commit: "+" }
    "-" : { commit: "-" }
    "=" : { commit: "=" }
    "[" : { commit: "[" }
    "]" : { commit: "]" }
    "{" : { commit: "{" }
    "}" : { commit: "}" }

# 快捷键
key_binder:
  bindings:
    - { when: has_menu, accept: minus, send: Page_Up }
    - { when: has_menu, accept: equal, send: Page_Down }
    - { when: paging, accept: comma, send: Page_Up }
    - { when: has_menu, accept: period, send: Page_Down }

# 候选触发
recognizer:
  patterns: {}
